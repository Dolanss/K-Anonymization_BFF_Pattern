server:
  port: 8081

spring:
  application:
    name: anonymization-service
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

staging:
  datasource:
    url: ${STAGING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/dataanon?currentSchema=staging}
    username: ${DATASOURCE_USERNAME:dataanon}
    password: ${DATASOURCE_PASSWORD:dataanon_secret}
    driver-class-name: org.postgresql.Driver

anonymized:
  datasource:
    url: ${ANONYMIZED_DATASOURCE_URL:jdbc:postgresql://localhost:5432/dataanon?currentSchema=anonymized}
    username: ${DATASOURCE_USERNAME:dataanon}
    password: ${DATASOURCE_PASSWORD:dataanon_secret}
    driver-class-name: org.postgresql.Driver

anonymization:
  k-threshold: 5

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
