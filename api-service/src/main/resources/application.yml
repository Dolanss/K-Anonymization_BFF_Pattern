server:
  port: 8080

spring:
  application:
    name: api-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/dataanon?currentSchema=anonymized}
    username: ${SPRING_DATASOURCE_USERNAME:dataanon}
    password: ${SPRING_DATASOURCE_PASSWORD:dataanon_secret}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: anonymized
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    schemas: anonymized
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cache:
    type: redis
    redis:
      time-to-live: 300000

cache:
  ttl:
    benchmarks: 3600000
    metrics: 86400000
    sectors: 86400000
    dashboard: 300000
    goals: 60000

jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration: ${JWT_EXPIRATION:28800000}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

management:
  endpoints:
    web:
      exposure:
        include: health,info,caches
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
